<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-FLOW Transaction Manager Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .card { background: white; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border-radius: 1rem; }
        
        /* ส่วนที่ตรึงไว้ด้านบน */
        .sticky-header { flex-shrink: 0; padding: 1.5rem; overflow-y: auto; }
        
        /* ส่วนตารางที่เลื่อนได้ */
        .table-container { flex-grow: 1; overflow-y: auto; padding: 0 1.5rem 1.5rem 1.5rem; }
        thead th { position: sticky; top: 0; z-index: 10; background-color: #1e293b; }
        
        .row-selected { background-color: #d1fae5 !important; transition: background-color 0.2s ease; }
        .row-copied { background-color: #bbf7d0 !important; transition: background-color 0.3s ease; }
        .clickable { cursor: pointer; color: #1d4ed8; font-weight: bold; transition: color 0.2s; }
        .clickable:hover { color: #1e3a8a; text-decoration: underline; }
        .flash-copy { animation: flash 0.5s; }
        @keyframes flash { 0% { background: #fef08a; } 100% { background: transparent; } }
        
        /* สไตล์สำหรับช่องวางรูปภาพ */
        .img-cell { border: 2px dashed #cbd5e1; border-radius: 4px; min-height: 60px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; background-color: #f8fafc; outline: none; transition: border-color 0.2s; }
        .img-cell:focus { border-color: #3b82f6; background-color: #eff6ff; }
        .img-cell img { max-width: 100px; max-height: 60px; object-fit: contain; }
        
        .toast { position: fixed; bottom: 20px; right: 20px; background: #334155; color: white; padding: 10px 20px; border-radius: 8px; opacity: 0; transition: opacity 0.3s; z-index: 50; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div id="toast" class="toast">คัดลอก 0000000001 เรียบร้อยแล้ว</div>
    
    <!-- ส่วนตรึงด้านบน -->
    <div class="sticky-header max-w-7xl w-full mx-auto">
        <div class="mb-4 border-b pb-4">
            <h1 class="text-2xl font-bold text-slate-800">M-FLOW Transaction Manager</h1>
        </div>
        <div class="card p-6">
            <div class="space-y-4">
                <textarea id="rawInput" class="w-full h-24 p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm" placeholder="วางข้อมูลที่นี่..."></textarea>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <button onclick="smartProcess()" class="bg-purple-600 hover:bg-purple-700 text-white py-2 rounded-lg font-bold transition">ประมวลผลข้อมูล</button>
                    <button onclick="copyReference()" class="bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-bold transition">คัดลอก 0000000001</button>
                    <button onclick="clearData()" class="bg-red-500 hover:bg-red-600 text-white py-2 rounded-lg font-bold transition">ล้างข้อมูล</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ส่วนตารางที่เลื่อนได้ -->
    <div class="table-container max-w-7xl w-full mx-auto">
        <div class="card overflow-hidden">
            <table class="w-full border-collapse">
                <thead class="bg-slate-800 text-white text-xs">
                    <tr>
                        <th class="p-3"><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)"></th>
                        <th class="p-3">ทะเบียน Manual</th>
                        <th class="p-3">ประเภท</th>
                        <th class="p-3">ด่าน</th>
                        <th class="p-3">วันเวลา</th>
                        <th class="p-3">ทะเบียน ระบบ</th>
                        <th class="p-3 w-1/4">สรุป</th>
                        <th class="p-3">รูปภาพ (วางรูป)</th>
                    </tr>
                </thead>
                <tbody id="resultBody" class="text-sm"></tbody>
            </table>
        </div>
    </div>
    
    <input type="text" id="clipboardHelper" style="position: absolute; left: -9999px;">

    <script>
        const MONTHS = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม", "ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];

        function formatDateTime(str) {
            str = str.trim();
            const match = str.match(/(\d{1,2})[-/](\d{1,2})[-/](\d{2,4})(?:\s+)(\d{1,2}:\d{2})(?::(\d{2}))?/);
            if (match) {
                let day = match[1].padStart(2, '0');
                let month = match[2].padStart(2, '0');
                let year = match[3];
                if (year.length === 2) year = '20' + year;
                return `${day}/${month}/${year} ${match[4]}:${match[5] || '00'}`;
            }
            return str;
        }

        function showToast(message, duration = 2000) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        function copyReference() {
            const helper = document.getElementById('clipboardHelper');
            helper.value = "0000000001";
            helper.select();
            document.execCommand('copy');
            showToast("คัดลอก 0000000001 เรียบร้อยแล้ว");
        }

        // ฟังก์ชันสำหรับคัดลอกรูปภาพเมื่อคลิกที่รูป
        async function copySingleImage(imgElement) {
            // Visual Feedback
            imgElement.style.opacity = '0.5';
            setTimeout(() => imgElement.style.opacity = '1', 200);

            // เทสีเขียวที่แถวทันทีที่คลิก
            const row = imgElement.closest('tr');
            if (row) row.classList.add('row-copied');

            try {
                // พยายามใช้ Clipboard API ก่อน (หากเบราว์เซอร์อนุญาต)
                const response = await fetch(imgElement.src);
                const blob = await response.blob();
                const item = new ClipboardItem({ [blob.type]: blob });
                await navigator.clipboard.write([item]);
                showToast("คัดลอกรูปภาพและเทสีแถวแล้ว (นำไปวางได้เลย)", 3000);
            } catch (err) {
                // หากติดข้อจำกัดของระบบ ให้ใช้ Fallback HTML Copy
                fallbackCopyImage(imgElement);
            }
        }

        function fallbackCopyImage(imgElement) {
            const tempDiv = document.createElement('div');
            tempDiv.contentEditable = true;
            tempDiv.style.position = 'fixed';
            tempDiv.style.left = '-9999px';
            
            const clonedImg = imgElement.cloneNode(true);
            clonedImg.removeAttribute('onclick'); 
            clonedImg.removeAttribute('alt'); // ลบ alt ออก ป้องกันปัญหาข้อความ 'pasted-image' โผล่ใน Sheets
            clonedImg.removeAttribute('title');
            
            tempDiv.appendChild(clonedImg);
            document.body.appendChild(tempDiv);
            
            const range = document.createRange();
            range.selectNode(clonedImg);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
            
            try {
                document.execCommand('copy');
                // โชว์ข้อความเตือนให้คลิกขวาเพื่อความชัวร์สำหรับการวางใน Sheets
                showToast("เทสีแถวเรียบร้อย! (หากวางใน Sheet ไม่ติด แนะนำให้คลิกขวาที่รูป -> คัดลอกรูปภาพ)", 4000);
            } catch (e) {
                console.error('Copy failed:', e);
            } finally {
                selection.removeAllRanges();
                document.body.removeChild(tempDiv);
            }
        }

        function pasteImage(e, element) {
            e.preventDefault();
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    const blob = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        // ไม่ใส่ alt="" เพื่อป้องกันขยะติดไปคลิปบอร์ด
                        element.innerHTML = `<img src="${event.target.result}" alt="" onclick="copySingleImage(this)" title="คลิกซ้าย: เทสีแถว / คลิกขวา: เลือกคัดลอกรูปภาพ (สำหรับ Sheet)" class="cursor-pointer transition-opacity duration-200 hover:opacity-80">`;
                        element.classList.remove('text-slate-400');
                    };
                    reader.readAsDataURL(blob);
                    return; // เสร็จสิ้นการวางรูปเดียว
                }
            }
        }

        function clearData() {
            document.getElementById('rawInput').value = '';
            document.getElementById('resultBody').innerHTML = '';
            document.getElementById('selectAll').checked = false;
        }

        function updateRowStyle(checkbox) {
            const row = checkbox.closest('tr');
            if (checkbox.checked) {
                row.classList.add('row-selected');
            } else {
                row.classList.remove('row-selected');
                row.classList.remove('row-copied');
            }
        }

        function toggleSelectAll(source) {
            const checkboxes = document.querySelectorAll('.row-checkbox');
            checkboxes.forEach(checkbox => {
                checkbox.checked = source.checked;
                updateRowStyle(checkbox);
            });
        }

        function handleCopy(e, text, mode) {
            e.preventDefault();
            let textToCopy = text;
            if (mode === 'plate') {
                textToCopy = text.trim().split(/\s+/).slice(0, 2).join(' ');
            } else if (mode === 'time') {
                const timeMatch = text.match(/(\d{2}:\d{2})/);
                textToCopy = timeMatch ? timeMatch[0] : text;
            }
            
            const helper = document.getElementById('clipboardHelper');
            helper.value = textToCopy;
            helper.select();
            document.execCommand('copy');
            
            if (mode === 'summary') {
                const row = e.target.closest('tr');
                row.classList.add('row-copied');
            }
            e.target.classList.add('flash-copy');
            showToast("คัดลอกข้อมูลเรียบร้อยแล้ว", 2000);
            setTimeout(() => e.target.classList.remove('flash-copy'), 500);
        }

        function smartProcess() {
            const raw = document.getElementById('rawInput').value;
            const lines = raw.split('\n');
            const body = document.getElementById('resultBody');
            body.innerHTML = '';
            document.getElementById('selectAll').checked = false;
            
            lines.forEach(line => {
                if(!line.trim()) return;
                const dateMatch = line.match(/(\d{1,2}[-/]\d{1,2}[-/]\d{2,4}\s+\d{1,2}:\d{2}(?::\d{2})?)/);
                if (dateMatch) {
                    const dateStr = dateMatch[0];
                    const [leftPart, rightPart] = line.split(dateStr);
                    const manualPlate = leftPart.split("ตรวจสอบรายการผ่านทาง")[0].trim();
                    const type = "ตรวจสอบรายการผ่านทาง";
                    const toll = leftPart.split("ผ่านทาง")[1].trim().split(/\s+/)[0];
                    const rightFiltered = rightPart.split(/\s+/).filter(w => !MONTHS.includes(w) && w.trim() !== "");
                    const systemPlate = rightFiltered.slice(0, 3).join(" ");
                    const formattedDate = formatDateTime(dateStr);
                    const summary = `เป็นการอนุมัติรายการคลาดเคลื่อน ทะเบียนผิด ${systemPlate} ทะเบียนที่ถูก ${manualPlate}`;
                    
                    body.innerHTML += `<tr>
                        <td class="p-3 text-center"><input type="checkbox" class="row-checkbox" onchange="updateRowStyle(this)"></td>
                        <td class="p-3"><span class="clickable" onclick="handleCopy(event, '${manualPlate}', 'plate')">${manualPlate}</span></td>
                        <td class="p-3">${type}</td>
                        <td class="p-3">${toll}</td>
                        <td class="p-3"><span class="clickable" onclick="handleCopy(event, '${formattedDate}', 'time')">${formattedDate}</span></td>
                        <td class="p-3"><span class="clickable" onclick="handleCopy(event, '${systemPlate}', 'plate')">${systemPlate}</span></td>
                        <td class="p-3"><span class="clickable" onclick="handleCopy(event, '${summary}', 'summary')">${summary}</span></td>
                        <td class="p-3">
                            <div class="img-cell text-slate-400 text-xs" tabindex="0" onpaste="pasteImage(event, this)">
                                คลิกแล้วกด Ctrl+V
                            </div>
                        </td>
                    </tr>`;
                }
            });
        }
    </script>
</body>
</html>
